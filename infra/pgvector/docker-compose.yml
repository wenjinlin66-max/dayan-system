services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: dayan-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dayan_agentic2
    ports:
      - "55432:5432"
    volumes:
      - dayan_pgvector_data:/var/lib/postgresql/data

volumes:
  dayan_pgvector_data:
