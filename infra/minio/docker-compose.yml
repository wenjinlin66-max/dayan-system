services:
  minio:
    image: minio/minio:latest
    container_name: dayan-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "59000:9000"
      - "59001:9001"
    volumes:
      - dayan_minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'waiting for minio...' && sleep 2; done;
      /usr/bin/mc mb -p local/dayan-agent-files || true;
      /usr/bin/mc anonymous set none local/dayan-agent-files || true;
      exit 0;
      "

volumes:
  dayan_minio_data:
